<!DOCTYPE html>
<!--
Robot simulator — single page. Open this file in a browser (or serve it from
the demo monitor's launcher). It plays the role of a robot that:

  • registers a robot_id with the backend over WebSocket          (API 1)
  • fetches a random sample from the PIAD dataset                  (API 11)
  • sends the sample to the backend for inference                  (API 6)
  • renders the original point cloud and the returned heat-map     (three.js)
  • lets the user mark interaction points and send feedback        (API 9)
-->

<meta charset="utf-8">
<title>Robot Simulator</title>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Globals ────────────────────────────────────────────────────────────
let ws = null;
const pending = new Map();   // request_id → resolver
let datasetLoaded = false;
let robotId = null;
let currentSample = null;
let lastInfer = null;        // { preference, points }
let selectedPts = new Set(); // indices into the displayed preference cloud

function uuid4() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c/4).toString(16));
}

// ─── WebSocket plumbing ────────────────────────────────────────────────
function call(api, payload) {
  return new Promise((resolve, reject) => {
    if (!ws || ws.readyState !== 1) return reject(new Error("not connected"));
    const id = uuid4();
    pending.set(id, { resolve, reject });
    ws.send(JSON.stringify({ type: api, request_id: id, payload }));
    setTimeout(() => {
      if (pending.has(id)) {
        pending.delete(id);
        reject(new Error("timeout"));
      }
    }, 60000);
  });
}

function setConnStatus(text, ok) {
  const el = document.getElementById('conn-status');
  el.textContent = text;
  el.className = 'status ' + (ok ? 'pill-ok' : 'pill-bad');
}

function attemptConnectButton() {
  const url = document.getElementById('ws-url').value.trim();
  const rid = document.getElementById('robot-id').value.trim();
  document.getElementById('connect').disabled = !(url && rid && !ws);
}

document.getElementById('ws-url').addEventListener('input', attemptConnectButton);
document.getElementById('robot-id').addEventListener('input', attemptConnectButton);

// 页面加载时初始化按钮状态
window.addEventListener('DOMContentLoaded', attemptConnectButton);

document.getElementById('connect').addEventListener('click', async () => {
  const url = document.getElementById('ws-url').value.trim();
  robotId = document.getElementById('robot-id').value.trim();
  try {
    ws = new WebSocket(url);
  } catch (e) {
    setConnStatus("连接错误：URL 不合法", false);
    return;
  }
  ws.onopen = async () => {
    try {
      const r = await call('register_robot', { robot_id: robotId });
      if (!r.ok) {
        setConnStatus("注册失败：" + r.error, false);
        ws.close(); return;
      }
      setConnStatus("已连接 — " + robotId, true);
      document.getElementById('ws-url').readOnly = true;
      document.getElementById('robot-id').readOnly = true;
      document.getElementById('connect').disabled = true;
      document.getElementById('disconnect').disabled = false;
      document.getElementById('send').disabled = !currentSample;
    } catch (e) {
      setConnStatus("注册错误：" + e.message, false);
      ws.close();
    }
  };
  ws.onclose = () => {
    setConnStatus("已断开", false);
    document.getElementById('ws-url').readOnly = false;
    document.getElementById('robot-id').readOnly = false;
    document.getElementById('disconnect').disabled = true;
    document.getElementById('send').disabled = true;
    document.getElementById('feedback').disabled = true;
    ws = null;
    attemptConnectButton();
  };
  ws.onerror = () => setConnStatus("连接出错（请检查地址或网络）", false);
  ws.onmessage = ev => {
    let msg; try { msg = JSON.parse(ev.data); } catch { return; }
    const id = msg.request_id;
    if (id && pending.has(id)) {
      const { resolve } = pending.get(id); pending.delete(id); resolve(msg);
    }
    // 处理来自监控端的用户反馈
    if (msg.type === 'user_feedback_received') {
      handleUserFeedback(msg.payload);
    }
  };
});

document.getElementById('disconnect').addEventListener('click', () => {
  if (ws) ws.close();
});

// ─── Dataset load (HTTP, strictly separated from WS) ───────────────────
document.getElementById('loadDataset').addEventListener('click', async () => {
  const setting = document.getElementById('setting').value;
  const base = document.getElementById('http-url').value.trim().replace(/\/$/, '');
  document.getElementById('dataset-status').textContent = "加载中…";
  try {
    const r0 = await fetch(`${base}/dataset/load?setting=${setting}`)
                   .then(r => r.json());
    if (!r0.ok) {
      document.getElementById('dataset-status').textContent = "失败：" + r0.error;
      return;
    }
    const r1 = await fetch(`${base}/dataset/sample?setting=${setting}`)
                   .then(r => r.json());
    if (!r1.ok) {
      document.getElementById('dataset-status').textContent = "样本失败：" + r1.error;
      return;
    }
    datasetLoaded = true;
    document.getElementById('dataset-status').textContent =
      `${setting} 已加载（共 ${r0.data.size} 条）`;
    setSample(r1.data);
  } catch (e) {
    document.getElementById('dataset-status').textContent = "失败：" + e.message;
  }
});

document.getElementById('next').addEventListener('click', async () => {
  if (!datasetLoaded) return;
  const setting = document.getElementById('setting').value;
  const base = document.getElementById('http-url').value.trim().replace(/\/$/, '');
  try {
    const r = await fetch(`${base}/dataset/sample?setting=${setting}`)
                  .then(r => r.json());
    if (r.ok) setSample(r.data);
  } catch (e) {
    document.getElementById('dataset-status').textContent = "失败：" + e.message;
  }
});

function setSample(d) {
  currentSample = d;
  document.getElementById('sample-img').src = d.image;
  document.getElementById('sample-points').textContent = d.points.length;
  document.getElementById('sample-object').textContent = d.object;
  document.getElementById('sample-aff').textContent = d.affordance;
  document.getElementById('sample-idx').textContent = d.index;
  document.getElementById('send').disabled = !(ws && ws.readyState === 1);
  renderOriginal(d.points, d.gt_preference);
}

// ─── Send sample (API 6) ───────────────────────────────────────────────
document.getElementById('send').addEventListener('click', async () => {
  if (!currentSample) return;
  document.getElementById('infer-status').textContent = "推理中…";
  try {
    const r = await call('infer_from_robot', {
      robot_id: robotId,
      image: currentSample.image,
      points: currentSample.points,
      sub_box: currentSample.sub_box,
      obj_box: currentSample.obj_box,
      object: currentSample.object,
      affordance: currentSample.affordance,
      gt: currentSample.gt_preference,
    });
    if (!r.ok) {
      document.getElementById('infer-status').textContent = "失败：" + r.error;
      return;
    }
    lastInfer = r.data;
    selectedPts.clear();
    renderPrediction(r.data.points, r.data.preference);
    document.getElementById('infer-status').textContent =
      `命中图像记忆 ${r.data.info?.image_memory_hits ?? 0} 条 · ` +
      (r.data.info?.pref_memory_applied ? "已融合偏好记忆" : "未融合偏好记忆");
    document.getElementById('feedback').disabled = false;
  } catch (e) {
    document.getElementById('infer-status').textContent = "异常：" + e.message;
  }
});

// ─── Feedback (API 9) ──────────────────────────────────────────────────
document.getElementById('feedback').addEventListener('click', async () => {
  if (!lastInfer) return;
  // Build a feedback preference: copy the predicted preference but mask in
  // the user-selected indices with 1.0 (positive reinforcement).
  const pref = lastInfer.preference.slice();
  for (const i of selectedPts) pref[i] = 1.0;
  const outcome = document.getElementById('feedback-outcome').value;
  const r = await call('feedback', {
    robot_id: robotId, preference: pref, outcome,
  });
  document.getElementById('feedback-status').textContent =
    r.ok ? ("已缓存 " + r.data.cache_path) : ("失败：" + r.error);
});

// ─── Handle User Feedback from Monitor ───────────────────────────────
let pendingUserFeedback = null;

function handleUserFeedback(payload) {
  console.log('收到用户指导反馈:', payload);
  pendingUserFeedback = payload;
  
  // 显示反馈通知行
  const feedbackRow = document.getElementById('user-feedback-row');
  feedbackRow.style.display = 'flex';
  
  // 更新反馈状态信息
  const statusEl = document.getElementById('user-feedback-status');
  const timestamp = new Date(payload.timestamp * 1000).toLocaleTimeString();
  statusEl.textContent = `来自监控端 (${timestamp}) - 评价: ${payload.outcome}`;
  
  // 如果有当前推理结果，立即显示用户的反馈热图
  if (lastInfer && payload.preference && payload.preference.length > 0) {
    renderPrediction(lastInfer.points, payload.preference);
    document.getElementById('infer-status').textContent = 
      `已应用用户指导反馈 - 来自监控端 (${timestamp})`;
  }
}

// 接受用户反馈
function acceptUserFeedback() {
  if (!pendingUserFeedback) return;
  
  console.log('机器人接受用户指导反馈:', pendingUserFeedback);
  
  // 更新当前推理结果为用户反馈的偏好值
  if (lastInfer && pendingUserFeedback.preference) {
    lastInfer.preference = pendingUserFeedback.preference;
    
    // 重新渲染点云显示用户反馈的热图
    if (lastInfer.points) {
      renderPrediction(lastInfer.points, pendingUserFeedback.preference);
    }
    
    // 更新状态显示
    const timestamp = new Date(pendingUserFeedback.timestamp * 1000).toLocaleTimeString();
    document.getElementById('infer-status').textContent = 
      `✓ 已接受用户指导反馈 (${timestamp}) - 评价: ${pendingUserFeedback.outcome}`;
  }
  
  // 隐藏反馈通知行
  document.getElementById('user-feedback-row').style.display = 'none';
  pendingUserFeedback = null;
}

// 忽略用户反馈
function dismissUserFeedback() {
  console.log('机器人忽略用户指导反馈');
  
  // 如果有原始推理结果，恢复显示
  if (lastInfer && lastInfer.preference) {
    renderPrediction(lastInfer.points, lastInfer.preference);
    document.getElementById('infer-status').textContent = 
      '已忽略用户指导反馈，显示原始推理结果';
  }
  
  // 隐藏反馈通知行
  document.getElementById('user-feedback-row').style.display = 'none';
  pendingUserFeedback = null;
}

// 绑定按钮事件
document.getElementById('accept-user-feedback').addEventListener('click', acceptUserFeedback);
document.getElementById('dismiss-user-feedback').addEventListener('click', dismissUserFeedback);

// ─── three.js point cloud renderer ─────────────────────────────────────
function makeScene(canvas) {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf8fafc); // 改为浅色背景
  const camera = new THREE.PerspectiveCamera(
    60, canvas.clientWidth / canvas.clientHeight, 0.01, 1000);
  camera.position.set(1.5, 1.5, 1.5);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  scene.add(new THREE.AxesHelper(0.5));

  function loop() {
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }
  loop();

  function onResize() {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h; camera.updateProjectionMatrix();
  }
  new ResizeObserver(onResize).observe(canvas);
  return { scene, camera, renderer, controls };
}

const sceneA = makeScene(document.getElementById('canvas-orig'));
const sceneB = makeScene(document.getElementById('canvas-pred'));
let pointsObjA = null;
let pointsObjB = null;
let predPositions = null;  // Float32Array
let predPreference = null; // Float32Array

function buildPoints(positions, colors, size) {
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size, vertexColors: true, sizeAttenuation: false });
  return new THREE.Points(geom, mat);
}

function prefToColor(v) {
  // v in [0, 1]; -1 (high-uncertain) → purple, high → red, low → blue
  if (v < 0) return [0.6, 0.2, 0.8];
  const t = Math.max(0, Math.min(1, v));
  return [t, 0.15 + 0.3 * (1 - t), 1 - t];
}

function renderOriginal(pts, gtPref) {
  const N = pts.length;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    pos[i*3] = pts[i][0]; pos[i*3+1] = pts[i][1]; pos[i*3+2] = pts[i][2];
    const v = gtPref ? gtPref[i] : 0.5;
    const c = prefToColor(v);
    col[i*3] = c[0]; col[i*3+1] = c[1]; col[i*3+2] = c[2];
  }
  if (pointsObjA) sceneA.scene.remove(pointsObjA);
  pointsObjA = buildPoints(pos, col, +document.getElementById('size-orig').value);
  sceneA.scene.add(pointsObjA);
}

function renderPrediction(pts, pref) {
  const N = pts.length;
  predPositions = new Float32Array(N * 3);
  predPreference = new Float32Array(pref);
  const col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    predPositions[i*3] = pts[i][0];
    predPositions[i*3+1] = pts[i][1];
    predPositions[i*3+2] = pts[i][2];
    const c = prefToColor(pref[i]);
    col[i*3] = c[0]; col[i*3+1] = c[1]; col[i*3+2] = c[2];
  }
  if (pointsObjB) sceneB.scene.remove(pointsObjB);
  pointsObjB = buildPoints(predPositions, col, +document.getElementById('size-pred').value);
  sceneB.scene.add(pointsObjB);
}

document.getElementById('size-orig').addEventListener('input', e => {
  if (pointsObjA) pointsObjA.material.size = +e.target.value;
});
document.getElementById('size-pred').addEventListener('input', e => {
  if (pointsObjB) pointsObjB.material.size = +e.target.value;
});
document.getElementById('reset-orig').addEventListener('click', () => {
  sceneA.controls.reset(); sceneA.camera.position.set(1.5,1.5,1.5);
});
document.getElementById('reset-pred').addEventListener('click', () => {
  sceneB.controls.reset(); sceneB.camera.position.set(1.5,1.5,1.5);
});

// ─── Click interaction on prediction cloud ─────────────────────────────
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.02;
const mouse = new THREE.Vector2();

document.getElementById('canvas-pred').addEventListener('pointerdown', ev => {
  if (!pointsObjB) return;
  const rect = ev.target.getBoundingClientRect();
  mouse.x =  ((ev.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((ev.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, sceneB.camera);
  const hits = raycaster.intersectObject(pointsObjB);
  if (!hits.length) return;
  const idx = hits[0].index;
  const n = +document.getElementById('neighbor-n').value || 0;
  // left button = clear-then-pick ; right button = additive merge
  const additive = ev.button === 2;
  if (!additive) selectedPts.clear();

  if (n === 0) selectedPts.add(idx);
  else pickNeighbors(idx, n).forEach(i => selectedPts.add(i));
  highlightSelection();
});
document.getElementById('canvas-pred').addEventListener('contextmenu',
  e => e.preventDefault());

function pickNeighbors(centerIdx, n) {
  const N = predPositions.length / 3;
  const cx = predPositions[centerIdx*3],
        cy = predPositions[centerIdx*3+1],
        cz = predPositions[centerIdx*3+2];
  const dists = new Array(N);
  for (let i = 0; i < N; i++) {
    const dx = predPositions[i*3]-cx,
          dy = predPositions[i*3+1]-cy,
          dz = predPositions[i*3+2]-cz;
    dists[i] = [i, dx*dx + dy*dy + dz*dz];
  }
  dists.sort((a, b) => a[1] - b[1]);
  return dists.slice(0, n + 1).map(d => d[0]);
}

function highlightSelection() {
  if (!pointsObjB) return;
  const col = pointsObjB.geometry.attributes.color.array;
  const N = predPreference.length;
  for (let i = 0; i < N; i++) {
    const c = prefToColor(predPreference[i]);
    col[i*3] = c[0]; col[i*3+1] = c[1]; col[i*3+2] = c[2];
  }
  for (const i of selectedPts) {
    col[i*3] = 1.0; col[i*3+1] = 1.0; col[i*3+2] = 0.0;
  }
  pointsObjB.geometry.attributes.color.needsUpdate = true;
}
